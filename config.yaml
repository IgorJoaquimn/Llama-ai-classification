# Llama AI Classification Configuration

# File Paths
input_file: "data/df_videos_transcript.parquet"
output_file: "data/output_classification.parquet"
prompt_file: "prompt.txt"

# Model Configuration
model_id: "Qwen/Qwen2.5-0.5B-Instruct"
max_new_tokens: 512
batch_size: 8  # Increase this based on your VRAM (e.g., 8, 16, 32)
quantization: "none" # Options: "4bit", "8bit", "none"

# Hardware Configuration
device: "auto"
# Use Flash Attention 2 for faster processing (requires Ampere GPU or newer)
use_flash_attention: false
